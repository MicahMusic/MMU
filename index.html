<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MMU</title>
  <meta name="description" content="MMU — VST-style homepage UI." />
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="assets/mm.js" defer></script>
</head>
<body>
  <main class="mmu" id="mmu" data-power="off">
    <header class="mmu__top">
      <div class="brand">
        <div class="brand__mark" aria-hidden="true"></div>
        <div class="brand__text">
          <div class="brand__name">MMU</div>
          <div class="brand__tag">Micah Music Unit</div>
        </div>
      </div>

      <div class="topbar">
        <div class="topbar__group">
          <button class="btn btn--power" type="button" data-action="power" aria-pressed="false">
            <span class="led" aria-hidden="true"></span>
            POWER
          </button>

          <div class="pill">
            <span class="pill__label">CPU</span>
            <span class="pill__value" data-readout="cpu">0%</span>
          </div>

          <div class="pill">
            <span class="pill__label">OUT</span>
            <span class="pill__value" data-readout="out">-∞ dB</span>
          </div>
        </div>

        <nav class="nav" aria-label="MMU pages">
          <a class="nav__link" href="index.html">Home</a>
          <a class="nav__link" href="instrumentals.html">Instrumentals</a>
          <a class="nav__link" href="sync.html">Sync</a>
          <a class="nav__link" href="editorial.html">Editorial</a>
          <a class="nav__link" href="kits.html">Kits</a>
          <a class="nav__link" href="starters.html">Starters</a>
          <a class="nav__link" href="news.html">News</a>
          <a class="nav__link" href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <section class="mmu__panel">
      <!-- LEFT: screen -->
      <section class="card card--tweed">
        <div class="card__glass">
          <div class="row">
            <div class="title">MMU MAIN</div>
            <div class="status">
              <span class="statusdot" aria-hidden="true"></span>
              <span data-readout="status">STANDBY</span>
            </div>
          </div>

          <div class="content">
            <div class="block block--metal">
              <div class="label">Preset</div>
              <div class="presetbar">
                <select class="select" data-control="preset" disabled>
                  <option value="init">Init</option>
                  <option value="warm">Warm Tape</option>
                  <option value="punch">Punch Comp</option>
                  <option value="wide">Wide Air</option>
                  <option value="club">Club Smash</option>
                </select>
                <div class="readout" data-readout="presetName">Init</div>
              </div>
            </div>

            <div class="block block--tweed">
              <div class="meters__head">
                <div class="label">Output Meter</div>
                <div class="transport">
                  <button class="btn btn--small" type="button" data-action="play" disabled>PLAY</button>
                  <button class="btn btn--small" type="button" data-action="stop" disabled>STOP</button>
                </div>
              </div>

              <div class="meter" role="img" aria-label="Animated level meter">
                <div class="meter__rail"><div class="meter__fill" data-meter="l"></div></div>
                <div class="meter__rail"><div class="meter__fill" data-meter="r"></div></div>
              </div>

              <div class="legend"><span>LIN</span><span>-12</span><span>-6</span><span>0</span><span>CLIP</span></div>
            </div>

            <div class="block block--metal">
              <div class="label">A / B</div>
              <div class="abrow">
                <button class="btn" type="button" data-action="storeA" disabled>STORE A</button>
                <button class="btn" type="button" data-action="recallA" disabled>RECALL A</button>
                <span class="vdiv" aria-hidden="true"></span>
                <button class="btn" type="button" data-action="storeB" disabled>STORE B</button>
                <button class="btn" type="button" data-action="recallB" disabled>RECALL B</button>
              </div>
              <div class="hint" data-readout="hint">Power on to enable controls.</div>
            </div>
          </div>
        </div>
      </section>

      <!-- RIGHT: controls -->
      <section class="card controls card--metal">
        <div class="controls__header">
          <div class="label">Controls</div>
          <button class="btn btn--ghost" type="button" data-action="reset" disabled>RESET</button>
        </div>

        <div class="grid grid--knobs">
          <!-- DRIVE -->
          <div class="control control--knob">
            <div class="control__top">
              <span class="control__name">Drive</span>
              <span class="control__value" data-readout="drive">0%</span>
            </div>
            <div class="knobrow">
              <div class="knob" tabindex="0" role="slider"
                   aria-label="Drive" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
                   data-control="drive" data-min="0" data-max="100" data-step="1" data-unit="%"></div>
              <input class="knob__input" type="range" min="0" max="100" step="1" value="0" data-control-input="drive" disabled />
            </div>
          </div>

          <!-- TONE -->
          <div class="control control--knob">
            <div class="control__top">
              <span class="control__name">Tone</span>
              <span class="control__value" data-readout="tone">50%</span>
            </div>
            <div class="knobrow">
              <div class="knob" tabindex="0" role="slider"
                   aria-label="Tone" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50"
                   data-control="tone" data-min="0" data-max="100" data-step="1" data-unit="%"></div>
              <input class="knob__input" type="range" min="0" max="100" step="1" value="50" data-control-input="tone" disabled />
            </div>
          </div>

          <!-- WIDTH -->
          <div class="control control--knob">
            <div class="control__top">
              <span class="control__name">Width</span>
              <span class="control__value" data-readout="width">100%</span>
            </div>
            <div class="knobrow">
              <div class="knob" tabindex="0" role="slider"
                   aria-label="Width" aria-valuemin="0" aria-valuemax="200" aria-valuenow="100"
                   data-control="width" data-min="0" data-max="200" data-step="1" data-unit="%"></div>
              <input class="knob__input" type="range" min="0" max="200" step="1" value="100" data-control-input="width" disabled />
            </div>
          </div>

          <!-- COMP -->
          <div class="control control--knob">
            <div class="control__top">
              <span class="control__name">Comp</span>
              <span class="control__value" data-readout="comp">0%</span>
            </div>
            <div class="knobrow">
              <div class="knob" tabindex="0" role="slider"
                   aria-label="Comp" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
                   data-control="comp" data-min="0" data-max="100" data-step="1" data-unit="%"></div>
              <input class="knob__input" type="range" min="0" max="100" step="1" value="0" data-control-input="comp" disabled />
            </div>
          </div>

          <!-- MIX -->
          <div class="control control--knob">
            <div class="control__top">
              <span class="control__name">Mix</span>
              <span class="control__value" data-readout="mix">100%</span>
            </div>
            <div class="knobrow">
              <div class="knob" tabindex="0" role="slider"
                   aria-label="Mix" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100"
                   data-control="mix" data-min="0" data-max="100" data-step="1" data-unit="%"></div>
              <input class="knob__input" type="range" min="0" max="100" step="1" value="100" data-control-input="mix" disabled />
            </div>
          </div>

          <!-- OUTPUT -->
          <div class="control control--knob">
            <div class="control__top">
              <span class="control__name">Output</span>
              <span class="control__value" data-readout="output">+0.0 dB</span>
            </div>
            <div class="knobrow">
              <div class="knob knob--db" tabindex="0" role="slider"
                   aria-label="Output" aria-valuemin="-12" aria-valuemax="12" aria-valuenow="0"
                   data-control="output" data-min="-12" data-max="12" data-step="0.5" data-unit="dB"></div>
              <input class="knob__input" type="range" min="-12" max="12" step="0.5" value="0" data-control-input="output" disabled />
            </div>
          </div>
        </div>

        <div class="footer">
          <div>MMU v1.0</div>
          <div class="dim">Metal • Tweed • Wood • Knobs</div>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
